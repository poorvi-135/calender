<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wall Calendar – Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #faf8f3;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --accent-warm: #f59e0b;
    --range-bg: #eff6ff;
    --red: #ef4444;
    --muted: #94a3b8;
    --border: #e2e8f0;
    --shadow: 0 8px 40px rgba(0,0,0,0.12);
    --shadow-deep: 0 24px 80px rgba(0,0,0,0.18);
    --radius: 20px;
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px 60px;
    font-family: var(--font-body);
  }

  /* Background texture */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(37,99,235,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(245,158,11,0.07) 0%, transparent 60%);
    pointer-events:none;
  }

  .calendar-shell {
    width:100%;
    max-width:960px;
  }

  /* ── TOP LABEL ── */
  .top-label {
    text-align:center;
    margin-bottom:24px;
    opacity:0;
    animation: fadeUp .6s ease .1s forwards;
  }
  .top-label span {
    font-family: var(--font-mono);
    font-size:11px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:rgba(255,255,255,.35);
  }

  /* ── BINDER RINGS ── */
  .rings {
    display:flex;
    justify-content:center;
    gap:28px;
    padding:0 60px;
    margin-bottom:0;
    position:relative;
    z-index:10;
    opacity:0;
    animation: fadeUp .5s ease .2s forwards;
  }
  .ring {
    width:22px; height:32px;
    border-radius:50% 50% 0 0 / 60% 60% 0 0;
    background: linear-gradient(135deg,#94a3b8,#475569,#94a3b8);
    box-shadow: 0 4px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.3);
    position:relative;
  }
  .ring::after {
    content:'';
    position:absolute;
    bottom:-4px; left:50%;
    transform:translateX(-50%);
    width:14px; height:8px;
    border-radius:0 0 50% 50%;
    background: linear-gradient(135deg,#94a3b8,#475569);
    box-shadow:0 2px 6px rgba(0,0,0,.3);
  }

  /* ── CALENDAR BODY ── */
  .calendar-body {
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: var(--shadow-deep), 0 0 0 1px rgba(255,255,255,.08);
    overflow: hidden;
    opacity:0;
    animation: fadeUp .7s ease .3s forwards;
    position:relative;
  }
  /* Paper texture */
  .calendar-body::before {
    content:'';
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,.03) 27px, rgba(0,0,0,.03) 28px);
    pointer-events:none;
    z-index:0;
    border-radius: var(--radius);
  }

  /* ── HERO ── */
  .hero {
    position:relative;
    height:320px;
    overflow:hidden;
  }
  @media(max-width:640px) { .hero { height:220px; } }

  .hero-bg {
    width:100%; height:100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    position:relative;
    transition: background 0.6s ease;
  }

  /* Mountain scene illustration */
  .hero-scene {
    position:absolute; inset:0;
    overflow:hidden;
  }
  .mountain-back {
    position:absolute;
    bottom:0; left:0; right:0;
    height:75%;
    background: linear-gradient(160deg, #1e3a5f 0%, #2d5a8e 40%, #1a3a6e 100%);
    clip-path: polygon(0 60%, 15% 25%, 28% 45%, 40% 10%, 55% 40%, 70% 15%, 85% 35%, 100% 20%, 100% 100%, 0 100%);
  }
  .mountain-front {
    position:absolute;
    bottom:0; left:0; right:0;
    height:55%;
    background: linear-gradient(160deg, #0f2847 0%, #1a3a6e 50%, #0d1f3c 100%);
    clip-path: polygon(0 80%, 20% 40%, 35% 60%, 50% 25%, 65% 50%, 80% 30%, 100% 55%, 100% 100%, 0 100%);
  }
  .snow-caps {
    position:absolute;
    bottom:55%; left:0; right:0;
    height:30px;
    background: rgba(255,255,255,.15);
    clip-path: polygon(48% 100%, 50% 60%, 52% 100%);
  }
  .sky-gradient {
    position:absolute; inset:0;
    background: linear-gradient(180deg, #0a0f1e 0%, #1a2744 40%, #2d4a7a 70%, transparent 100%);
  }
  .stars {
    position:absolute; top:0; left:0; right:0; height:60%;
  }
  .star {
    position:absolute;
    width:2px; height:2px;
    background:white;
    border-radius:50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100%{opacity:.3} 50%{opacity:1}
  }

  /* Hero overlay content */
  .hero-content {
    position:absolute; inset:0;
    display:flex; align-items:flex-end;
    padding:24px 32px;
    background: linear-gradient(to top, rgba(10,15,30,.9) 0%, transparent 60%);
  }
  .month-year-badge {
    display:flex; flex-direction:column;
  }
  .month-name {
    font-family: var(--font-display);
    font-size: clamp(2rem,6vw,3.5rem);
    font-weight:900;
    color:white;
    letter-spacing:-1px;
    line-height:1;
    text-shadow: 0 2px 20px rgba(0,0,0,.5);
  }
  .year-tag {
    font-family: var(--font-mono);
    font-size:12px;
    letter-spacing:4px;
    color:rgba(255,255,255,.55);
    margin-top:4px;
  }

  /* Nav arrows */
  .hero-nav {
    position:absolute;
    top:50%; right:24px;
    transform:translateY(-50%);
    display:flex; flex-direction:column;
    gap:8px;
  }
  .nav-btn {
    width:36px; height:36px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(8px);
    color:white;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    transition: all .2s;
    border:1px solid rgba(255,255,255,.15);
  }
  .nav-btn:hover { background:rgba(255,255,255,.25); transform:scale(1.08); }

  /* Month theme dot */
  .theme-dot {
    position:absolute; top:20px; right:20px;
    width:10px; height:10px;
    border-radius:50%;
    background:var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  /* ── MAIN CONTENT AREA ── */
  .main-area {
    display:grid;
    grid-template-columns:1fr 280px;
    gap:0;
    position:relative;
    z-index:1;
  }
  @media(max-width:700px) {
    .main-area { grid-template-columns:1fr; }
  }

  /* ── CALENDAR GRID SECTION ── */
  .grid-section {
    padding:28px 28px 28px 32px;
    border-right:1px solid var(--border);
  }
  @media(max-width:700px) {
    .grid-section { border-right:none; border-bottom:1px solid var(--border); padding:20px; }
  }

  /* Day headers */
  .day-headers {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    margin-bottom:10px;
  }
  .day-header {
    font-family:var(--font-mono);
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--muted);
    text-align:center;
    padding:4px 0;
  }
  .day-header.weekend { color: var(--red); opacity:.7; }

  /* Days grid */
  .days-grid {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
  }

  .day-cell {
    aspect-ratio:1;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-body);
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    border-radius:10px;
    cursor:pointer;
    position:relative;
    transition: all .15s ease;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .day-cell:hover:not(.empty):not(.selected-start):not(.selected-end) {
    background:var(--accent-light);
    color:var(--accent);
  }
  .day-cell.empty { cursor:default; pointer-events:none; }
  .day-cell.today {
    font-weight:700;
    color:var(--accent-warm);
  }
  .day-cell.today::after {
    content:'';
    position:absolute;
    bottom:4px;
    left:50%; transform:translateX(-50%);
    width:4px; height:4px;
    border-radius:50%;
    background:var(--accent-warm);
  }
  .day-cell.weekend-day { color: #dc2626; }
  .day-cell.other-month { color: #c8cdd4; }

  /* Range selection */
  .day-cell.selected-start, .day-cell.selected-end {
    background: var(--accent) !important;
    color: white !important;
    font-weight:700;
    box-shadow: 0 4px 16px rgba(37,99,235,.4);
    z-index:2;
  }
  .day-cell.selected-start { border-radius:10px 4px 4px 10px; }
  .day-cell.selected-end   { border-radius:4px 10px 10px 4px; }
  .day-cell.selected-start.selected-end { border-radius:10px; }
  .day-cell.in-range {
    background: var(--range-bg);
    color: var(--accent);
    border-radius:0;
  }
  .day-cell.in-range:hover { background: #dbeafe; }

  /* has note dot */
  .day-cell.has-note::before {
    content:'';
    position:absolute;
    top:4px; right:4px;
    width:5px; height:5px;
    border-radius:50%;
    background:var(--accent-warm);
  }

  /* Range info */
  .range-info {
    margin-top:14px;
    padding:10px 14px;
    background: linear-gradient(135deg, var(--accent-light), #f0f9ff);
    border-radius:10px;
    border-left:3px solid var(--accent);
    display:none;
    animation:fadeUp .3s ease;
  }
  .range-info.visible { display:block; }
  .range-info-text {
    font-size:12px;
    color:var(--accent);
    font-weight:500;
  }
  .range-info-days {
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
  }
  .clear-range {
    font-size:11px;
    color:var(--red);
    cursor:pointer;
    float:right;
    font-weight:600;
    text-decoration:none;
  }
  .clear-range:hover { opacity:.7; }

  /* Quick select */
  .quick-select {
    display:flex; gap:6px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  .quick-btn {
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.5px;
    padding:5px 10px;
    border-radius:20px;
    border:1px solid var(--border);
    background:white;
    color:var(--ink);
    cursor:pointer;
    transition: all .15s;
  }
  .quick-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* ── NOTES SECTION ── */
  .notes-section {
    padding:28px 24px 28px 20px;
    display:flex; flex-direction:column;
    gap:0;
  }
  @media(max-width:700px) {
    .notes-section { padding:20px; }
  }

  .notes-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .notes-title {
    font-family:var(--font-display);
    font-size:18px;
    font-weight:700;
    color:var(--ink);
  }
  .notes-count {
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--muted);
    background:var(--border);
    padding:2px 8px;
    border-radius:20px;
  }

  /* Note tabs */
  .note-tabs {
    display:flex; gap:4px;
    margin-bottom:14px;
  }
  .note-tab {
    font-size:11px;
    padding:5px 12px;
    border-radius:20px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    font-family:var(--font-body);
    transition: all .15s;
  }
  .note-tab.active {
    background:var(--ink);
    color:white;
    border-color:var(--ink);
  }

  /* Textarea */
  .note-context-label {
    font-size:11px;
    color:var(--accent);
    font-weight:600;
    font-family:var(--font-mono);
    letter-spacing:.5px;
    margin-bottom:6px;
    min-height:16px;
  }
  .note-textarea {
    width:100%;
    flex:1;
    min-height:120px;
    resize:none;
    border:1.5px solid var(--border);
    border-radius:12px;
    padding:14px;
    font-family:var(--font-body);
    font-size:13px;
    line-height:1.6;
    color:var(--ink);
    background:white;
    transition: border .2s;
    outline:none;
  }
  .note-textarea:focus { border-color:var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .note-textarea::placeholder { color:#c0c8d4; font-style:italic; }

  /* Saved notes list */
  .saved-notes {
    margin-top:12px;
    display:flex; flex-direction:column;
    gap:8px;
    max-height:200px;
    overflow-y:auto;
  }
  .saved-notes::-webkit-scrollbar { width:4px; }
  .saved-notes::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .note-item {
    background:white;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    cursor:pointer;
    transition: all .15s;
    position:relative;
  }
  .note-item:hover { border-color:var(--accent); box-shadow:0 2px 8px rgba(37,99,235,.1); }
  .note-item-date {
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--accent);
    margin-bottom:4px;
  }
  .note-item-text {
    font-size:12px;
    color:var(--ink);
    line-height:1.4;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .note-item-del {
    position:absolute;
    top:8px; right:8px;
    font-size:14px;
    color:var(--muted);
    cursor:pointer;
    opacity:0;
    transition: opacity .15s;
    background:none; border:none;
  }
  .note-item:hover .note-item-del { opacity:1; }
  .note-item-del:hover { color:var(--red); }

  /* Save note btn */
  .save-note-row {
    display:flex; gap:8px;
    margin-top:10px;
  }
  .save-btn {
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    background: var(--ink);
    color:white;
    font-family:var(--font-body);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition: all .2s;
  }
  .save-btn:hover { background:var(--accent); box-shadow:0 4px 16px rgba(37,99,235,.3); }
  .save-btn:active { transform:scale(.98); }

  /* ── FOOTER ── */
  .calendar-footer {
    border-top:1px solid var(--border);
    padding:14px 32px;
    display:flex; align-items:center; justify-content:space-between;
    background:white;
    position:relative; z-index:1;
  }
  .footer-legend {
    display:flex; gap:16px; align-items:center; flex-wrap:wrap;
  }
  .legend-item {
    display:flex; align-items:center; gap:5px;
    font-size:11px;
    color:var(--muted);
    font-family:var(--font-mono);
  }
  .legend-dot {
    width:8px; height:8px;
    border-radius:50%;
  }
  .footer-tip {
    font-size:11px;
    color:var(--muted);
    font-style:italic;
    font-family:var(--font-body);
  }
  @media(max-width:500px) { .footer-tip { display:none; } }

  /* Animations */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── THEME SWITCHER ── */
  .theme-switcher {
    position:absolute;
    top:16px; left:50%;
    transform:translateX(-50%);
    display:flex; gap:6px;
    z-index:20;
  }
  .theme-swatch {
    width:14px; height:14px;
    border-radius:50%;
    cursor:pointer;
    transition: transform .2s;
    border:2px solid rgba(255,255,255,.3);
  }
  .theme-swatch:hover, .theme-swatch.active { transform:scale(1.3); border-color:white; }

  /* Toast */
  .toast {
    position:fixed;
    bottom:24px; right:24px;
    background:var(--ink);
    color:white;
    padding:10px 18px;
    border-radius:10px;
    font-size:13px;
    font-family:var(--font-body);
    box-shadow:0 8px 24px rgba(0,0,0,.3);
    transform:translateY(80px);
    opacity:0;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);
    z-index:999;
  }
  .toast.show { transform:translateY(0); opacity:1; }

  /* Responsive grid section title */
  .section-label {
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:16px;
  }

  /* ===== Visual Override (Creative Wall Calendar Look) ===== */
  body {
    background:
      radial-gradient(circle at 14% 10%, rgba(255,255,255,0.45), transparent 38%),
      radial-gradient(circle at 82% 88%, rgba(148,197,255,0.18), transparent 40%),
      #d3d5d8;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 28px 12px 42px;
  }

  body::before { background: none; }

  .calendar-shell {
    max-width: 510px;
    margin: 0 auto;
  }

  .top-label { display: none; }

  .rings {
    gap: 8px;
    padding: 0;
    margin-bottom: -3px;
  }

  .ring {
    width: 10px;
    height: 14px;
    border-radius: 999px;
    background: linear-gradient(180deg, #b4b7be, #5e616a);
    box-shadow: 0 1px 3px rgba(0,0,0,.35);
  }

  .ring::after {
    width: 6px;
    height: 4px;
    bottom: -2px;
  }

  .calendar-body {
    border-radius: 0;
    border: 1px solid #c3c6cb;
    box-shadow:
      0 26px 56px rgba(0,0,0,.24),
      0 4px 0 rgba(255,255,255,.45) inset;
    overflow: hidden;
    background: #f6f7f8;
  }

  .calendar-body::before { display: none; }

  .hero {
    height: 285px;
    border-bottom: 1px solid #d2d6dc;
  }

  .hero-bg {
    background:
      linear-gradient(145deg, rgba(255,255,255,.35), rgba(255,255,255,.06)),
      linear-gradient(180deg, #bcc8d9 0%, #cdd7e5 45%, #dde4ee 100%);
  }

  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(165deg, rgba(13,34,63,.84) 24%, rgba(9,22,43,.93) 72%),
      linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0));
    clip-path: polygon(0 57%, 40% 83%, 56% 73%, 100% 94%, 100% 100%, 0 100%);
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 2;
    background: linear-gradient(135deg, #21acec 0%, #1083cc 100%);
    clip-path: polygon(61% 77%, 100% 60%, 100% 100%, 67% 100%, 48% 88%);
  }

  .hero-scene {
    opacity: .58;
    mix-blend-mode: multiply;
    filter: saturate(.8) contrast(1.05);
  }

  .theme-dot,
  .theme-switcher { display: none; }

  .hero-content {
    align-items: flex-end;
    justify-content: flex-end;
    padding: 20px;
    background: none;
    z-index: 3;
  }

  .month-year-badge {
    display: flex;
    flex-direction: column-reverse;
    text-align: right;
    color: #fff;
  }

  .year-tag {
    margin-top: 0;
    letter-spacing: .01em;
    font-size: 34px;
    line-height: .92;
    color: #d8ecff;
    font-family: var(--font-body);
    font-weight: 300;
  }

  .month-name {
    margin-top: 2px;
    font-family: var(--font-body);
    font-size: 30px;
    font-weight: 700;
    letter-spacing: .02em;
    text-shadow: none;
  }

  .hero-nav {
    top: 14px;
    right: 14px;
    transform: none;
    flex-direction: row;
    gap: 6px;
    z-index: 4;
  }

  .nav-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,.55);
    background: rgba(0,0,0,.26);
  }

  .main-area {
    grid-template-columns: 1fr 205px;
    background: #f5f6f7;
  }

  .grid-section {
    padding: 16px 16px 14px;
    border-right: 1px solid #d9dde3;
    background: #f8f9fa;
  }

  .notes-section {
    padding: 14px 12px 12px;
    background: #f4f5f6;
  }

  .section-label {
    margin-bottom: 9px;
    letter-spacing: .18em;
    font-size: 9px;
    color: #6f7884;
  }

  .day-header {
    font-size: 9px;
    color: #6f7884;
    letter-spacing: .03em;
    font-family: var(--font-body);
  }

  .day-header.weekend { color: #2a9cdd; }

  .days-grid { gap: 3px; }

  .day-cell {
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    color: #2b313a;
  }

  .day-cell.other-month { color: #bbc2cb; }

  .day-cell.weekend-day { color: #2596d6; }

  .day-cell:hover:not(.empty):not(.selected-start):not(.selected-end) {
    background: #e7f5ff;
    color: #187cb5;
  }

  .day-cell.today::after { display: none; }
  .day-cell.today { box-shadow: inset 0 -2px 0 #f59e0b; }

  .day-cell.selected-start,
  .day-cell.selected-end {
    background: #1187cd !important;
    color: #fff !important;
    box-shadow: none;
    border-radius: 7px;
  }

  .day-cell.in-range {
    background: #dff0fc;
    color: #116895;
    border-radius: 0;
  }

  .range-info {
    margin-top: 10px;
    padding: 8px 10px;
    border-radius: 7px;
    border-left: 3px solid #1187cd;
    background: linear-gradient(135deg, #eaf6ff, #f8fcff);
  }

  .range-info-text { font-size: 11px; }
  .range-info-days { font-size: 10px; }

  .quick-select {
    margin-top: 9px;
    gap: 5px;
  }

  .quick-btn {
    font-size: 9px;
    padding: 5px 9px;
    border-radius: 999px;
    border-color: #d7dce2;
  }

  .quick-btn:hover {
    border-color: #1187cd;
    color: #1187cd;
  }

  .notes-header {
    margin-bottom: 8px;
    align-items: baseline;
  }

  .notes-title {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #657080;
  }

  .notes-count {
    font-size: 9px;
    padding: 2px 6px;
  }

  .note-tab {
    font-size: 9px;
    padding: 3px 8px;
  }

  .note-context-label {
    font-size: 9px;
    margin-bottom: 5px;
  }

  .note-textarea {
    min-height: 112px;
    border: 0;
    border-radius: 0;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 13px,
        #cfd4da 13px,
        #cfd4da 14px
      );
    padding: 0 2px;
    line-height: 14px;
    font-size: 10px;
    color: #2f3540;
  }

  .note-textarea:focus {
    box-shadow: none;
    outline: 1px dashed #91cbed;
  }

  .save-note-row { margin-top: 7px; }

  .save-btn {
    border-radius: 6px;
    padding: 7px 9px;
    font-size: 10px;
    background: #1f2f45;
  }

  .save-btn:hover {
    background: #1187cd;
    box-shadow: none;
  }

  .saved-notes {
    margin-top: 8px;
    max-height: 105px;
    gap: 5px;
  }

  .note-item {
    border-radius: 6px;
    padding: 6px 8px;
    border-color: #d7dbe1;
  }

  .note-item-date { font-size: 8px; }
  .note-item-text { font-size: 10px; }

  .calendar-footer { display: none; }

  @media (max-width: 700px) {
    .calendar-shell { max-width: 95vw; }
    .hero { height: 230px; }
    .year-tag { font-size: 27px; }
    .month-name { font-size: 24px; }
    .main-area { grid-template-columns: 1fr; }
    .grid-section {
      border-right: none;
      border-bottom: 1px solid #d9dde3;
      padding: 14px;
    }
    .notes-section { padding: 14px; }
  }
</style>
</head>
<body>

<div class="calendar-shell">
  <div class="top-label"><span>✦ Interactive Wall Calendar</span></div>

  <!-- RINGS -->
  <div class="rings" id="rings"></div>

  <!-- CALENDAR BODY -->
  <div class="calendar-body">

    <!-- HERO -->
    <div class="hero">
      <div class="hero-bg" id="heroBg">
        <div class="hero-scene" id="heroScene"></div>
      </div>
      <div class="theme-dot"></div>
      <!-- Month nav -->
      <div class="hero-nav">
        <button class="nav-btn" id="prevBtn">&#8593;</button>
        <button class="nav-btn" id="nextBtn">&#8595;</button>
      </div>
      <div class="hero-content">
        <div class="month-year-badge">
          <div class="month-name" id="monthName">JANUARY</div>
          <div class="year-tag" id="yearTag">2026</div>
        </div>
      </div>
      <!-- Theme switcher -->
      <div class="theme-switcher" id="themeSwitcher"></div>
    </div>

    <!-- MAIN AREA -->
    <div class="main-area">

      <!-- GRID -->
      <div class="grid-section">
        <div class="section-label">Select a Date Range</div>
        <div class="day-headers">
          <div class="day-header">MON</div>
          <div class="day-header">TUE</div>
          <div class="day-header">WED</div>
          <div class="day-header">THU</div>
          <div class="day-header">FRI</div>
          <div class="day-header weekend">SAT</div>
          <div class="day-header weekend">SUN</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>

        <!-- Range info -->
        <div class="range-info" id="rangeInfo">
          <a class="clear-range" id="clearRange">✕ Clear</a>
          <div class="range-info-text" id="rangeText"></div>
          <div class="range-info-days" id="rangeDays"></div>
        </div>

        <!-- Quick select -->
        <div class="quick-select">
          <button class="quick-btn" onclick="quickSelect(7)">This Week</button>
          <button class="quick-btn" onclick="quickSelect(14)">2 Weeks</button>
          <button class="quick-btn" onclick="quickSelect(30)">This Month</button>
          <button class="quick-btn" onclick="selectToday()">Today</button>
        </div>
      </div>

      <!-- NOTES -->
      <div class="notes-section">
        <div class="notes-header">
          <div class="notes-title">Notes</div>
          <div class="notes-count" id="notesCount">0 notes</div>
        </div>
        <div class="note-tabs">
          <button class="note-tab active" id="tabGeneral" onclick="switchTab('general')">General</button>
          <button class="note-tab" id="tabRange" onclick="switchTab('range')">For Range</button>
        </div>
        <div class="note-context-label" id="noteContextLabel"></div>
        <textarea class="note-textarea" id="noteTextarea" placeholder="Jot something down…&#10;Use the range selector to attach notes to specific dates."></textarea>
        <div class="save-note-row">
          <button class="save-btn" id="saveNoteBtn" onclick="saveNote()">Save Note</button>
        </div>
        <div class="saved-notes" id="savedNotes"></div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="calendar-footer">
      <div class="footer-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--accent)"></div> Selected
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--range-bg);border:1px solid var(--accent)"></div> Range
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--accent-warm)"></div> Today
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--accent-warm);opacity:.6"></div> Has note
        </div>
      </div>
      <div class="footer-tip">Click once: start date · Click again: end date</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let rangeStart = null;
let rangeEnd = null;
let selecting = false;
let notes = JSON.parse(localStorage.getItem('calNotes') || '[]');
let activeTab = 'general';

// ── THEMES ──
const themes = [
  { name:'Alpine', scene: drawAlpine, bg:'linear-gradient(135deg,#0f2027,#203a43,#2c5364)' },
  { name:'Sunset', scene: drawSunset, bg:'linear-gradient(135deg,#ff6b35,#f7931e,#c0392b)' },
  { name:'Forest', scene: drawForest, bg:'linear-gradient(135deg,#134e5e,#1a6b3a,#2ecc71)' },
  { name:'Arctic', scene: drawArctic, bg:'linear-gradient(135deg,#1a1a2e,#16213e,#2c5282)' },
  { name:'Desert', scene: drawDesert, bg:'linear-gradient(135deg,#b7791f,#d69e2e,#744210)' },
];
const swatchColors = ['#2c5364','#c0392b','#1a6b3a','#16213e','#b7791f'];
let currentTheme = 0;

function drawAlpine(container) {
  container.innerHTML = `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#0a0f1e 0%,#1a2744 40%,#2d4a7a 70%,transparent 100%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:75%;background:linear-gradient(160deg,#1e3a5f,#2d5a8e,#1a3a6e);clip-path:polygon(0 60%,15% 25%,28% 45%,40% 10%,55% 40%,70% 15%,85% 35%,100% 20%,100% 100%,0 100%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(160deg,#0f2847,#1a3a6e,#0d1f3c);clip-path:polygon(0 80%,20% 40%,35% 60%,50% 25%,65% 50%,80% 30%,100% 55%,100% 100%,0 100%)"></div>
    ${stars()}`;
}
function drawSunset(container) {
  container.innerHTML = `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#1a0a00 0%,#8b2500 30%,#d4631e 60%,#f4a261 80%,#e76f51 100%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(180deg,#2d1200,#1a0800);clip-path:polygon(0 80%,15% 50%,30% 70%,45% 35%,60% 60%,75% 40%,90% 55%,100% 45%,100% 100%,0 100%)"></div>
    <div style="position:absolute;top:25%;left:50%;transform:translateX(-50%);width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#ffd700,#ff8c00);box-shadow:0 0 60px 20px rgba(255,140,0,.5)"></div>`;
}
function drawForest(container) {
  container.innerHTML = `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#0a1f0f 0%,#134e2a 40%,#1e6b3a 70%,transparent 100%)"></div>
    ${trees()}
    <div style="position:absolute;bottom:0;left:0;right:0;height:18%;background:linear-gradient(180deg,#0d3b1a,#081a0c)"></div>`;
}
function drawArctic(container) {
  container.innerHTML = `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#0a0a1a 0%,#0d1b40 50%,#1a2f6b 80%,transparent 100%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(180deg,#c8dff0,#a0c4e0,#7badd4);clip-path:polygon(0 60%,10% 30%,20% 50%,30% 20%,40% 40%,55% 15%,70% 38%,85% 22%,100% 40%,100% 100%,0 100%)"></div>
    ${aurora()}`;
}
function drawDesert(container) {
  container.innerHTML = `
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,#0d0700 0%,#4a1900 30%,#8b4000 60%,#c46a00 100%)"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(0deg,#5c2800,#3d1c00);clip-path:polygon(0 100%,0 70%,15% 40%,25% 60%,35% 30%,50% 50%,60% 20%,70% 45%,80% 25%,90% 50%,100% 30%,100% 100%)"></div>
    <div style="position:absolute;top:20%;right:30%;width:50px;height:50px;border-radius:50%;background:radial-gradient(circle,#ffe680,#ffcc00);box-shadow:0 0 40px 15px rgba(255,200,0,.4)"></div>`;
}
function stars() {
  let s = '';
  for(let i=0;i<25;i++) s += `<div style="position:absolute;width:${Math.random()<.3?3:2}px;height:${Math.random()<.3?3:2}px;border-radius:50%;background:white;opacity:${.3+Math.random()*.7};top:${Math.random()*55}%;left:${Math.random()*100}%;animation:twinkle ${2+Math.random()*3}s ease-in-out infinite ${Math.random()*2}s"></div>`;
  return s;
}
function trees() {
  let t = '';
  const positions = [5,12,20,28,40,55,65,75,85,92];
  positions.forEach(x => {
    const h = 40 + Math.random()*30;
    t += `<div style="position:absolute;bottom:15%;left:${x}%;width:0;height:0;border-left:${8+Math.random()*6}px solid transparent;border-right:${8+Math.random()*6}px solid transparent;border-bottom:${h}px solid #0d3b1a;transform:translateX(-50%)"></div>`;
  });
  return t;
}
function aurora() {
  return `<div style="position:absolute;top:20%;left:0;right:0;height:40%;background:linear-gradient(180deg,transparent,rgba(0,255,120,.08),rgba(0,200,255,.06),transparent);animation:twinkle 4s ease-in-out infinite"></div>
          <div style="position:absolute;top:30%;left:10%;right:10%;height:30%;background:linear-gradient(180deg,transparent,rgba(120,0,255,.06),transparent);animation:twinkle 6s ease-in-out infinite 2s"></div>`;
}

// ── MONTHS ──
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── INIT RINGS ──
function initRings() {
  const r = document.getElementById('rings');
  for(let i=0;i<16;i++) r.innerHTML += `<div class="ring"></div>`;
}

// ── INIT THEME SWITCHER ──
function initThemeSwitcher() {
  const ts = document.getElementById('themeSwitcher');
  themes.forEach((t,i) => {
    const sw = document.createElement('div');
    sw.className = 'theme-swatch' + (i===0?' active':'');
    sw.style.background = swatchColors[i];
    sw.title = t.name;
    sw.onclick = () => { setTheme(i); document.querySelectorAll('.theme-swatch').forEach((s,j)=>s.classList.toggle('active',j===i)); };
    ts.appendChild(sw);
  });
}

function setTheme(i) {
  currentTheme = i;
  const t = themes[i];
  const scene = document.getElementById('heroScene');
  scene.style.opacity = '0';
  setTimeout(()=>{
    t.scene(scene);
    scene.style.opacity = '1';
    scene.style.transition = 'opacity .5s';
  }, 200);
}

// ── RENDER CALENDAR ──
function renderCalendar() {
  document.getElementById('monthName').textContent = MONTHS[viewMonth].toUpperCase();
  document.getElementById('yearTag').textContent = viewYear;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  // First day of month (Monday-based)
  const first = new Date(viewYear, viewMonth, 1);
  let startOffset = first.getDay() - 1; // 0=Mon
  if(startOffset < 0) startOffset = 6;

  // Days in month & prev month
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

  // Previous month trailing days
  for(let i=startOffset;i>0;i--) {
    const d = daysInPrev - i + 1;
    addCell(grid, d, true, new Date(viewYear, viewMonth-1, d));
  }
  // Current month
  for(let d=1;d<=daysInMonth;d++) {
    addCell(grid, d, false, new Date(viewYear, viewMonth, d));
  }
  // Next month leading days
  const total = startOffset + daysInMonth;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let d=1;d<=trailing;d++) {
    addCell(grid, d, true, new Date(viewYear, viewMonth+1, d));
  }

  updateRangeUI();
}

function addCell(grid, dayNum, otherMonth, dateObj) {
  const cell = document.createElement('div');
  cell.className = 'day-cell';
  cell.textContent = dayNum;
  cell.dataset.date = dateObj.toISOString().split('T')[0];

  if(otherMonth) cell.classList.add('other-month');

  const isToday = sameDay(dateObj, today);
  if(isToday) cell.classList.add('today');

  const dow = dateObj.getDay();
  if((dow === 0 || dow === 6) && !otherMonth) cell.classList.add('weekend-day');

  // has note?
  const dateStr = cell.dataset.date;
  if(notes.some(n => n.dateStr === dateStr || (n.rangeStart && n.rangeStart <= dateStr && n.rangeEnd >= dateStr))) {
    cell.classList.add('has-note');
  }

  applyRangeClass(cell, dateObj);

  cell.addEventListener('click', () => onDayClick(dateObj, cell));
  grid.appendChild(cell);
}

function applyRangeClass(cell, dateObj) {
  const ds = cell.dataset.date;
  if(rangeStart && sameDay(dateObj, rangeStart)) {
    cell.classList.add('selected-start');
    if(rangeEnd && sameDay(rangeStart, rangeEnd)) cell.classList.add('selected-end');
  }
  if(rangeEnd && sameDay(dateObj, rangeEnd)) {
    cell.classList.add('selected-end');
  }
  if(rangeStart && rangeEnd) {
    const rs = rangeStart < rangeEnd ? rangeStart : rangeEnd;
    const re = rangeStart < rangeEnd ? rangeEnd : rangeStart;
    if(dateObj > rs && dateObj < re) cell.classList.add('in-range');
  }
}

function sameDay(a,b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function onDayClick(dateObj, cell) {
  if(!rangeStart || (rangeStart && rangeEnd)) {
    rangeStart = new Date(dateObj); rangeEnd = null;
  } else {
    if(sameDay(dateObj, rangeStart)) { rangeStart = null; rangeEnd = null; }
    else { rangeEnd = new Date(dateObj); }
  }
  renderCalendar();
  updateRangeUI();
}

function updateRangeUI() {
  const info = document.getElementById('rangeInfo');
  if(rangeStart && rangeEnd) {
    info.classList.add('visible');
    const s = rangeStart < rangeEnd ? rangeStart : rangeEnd;
    const e = rangeStart < rangeEnd ? rangeEnd : rangeStart;
    const diff = Math.round((e-s)/(1000*60*60*24))+1;
    document.getElementById('rangeText').textContent = `${fmtDate(s)} → ${fmtDate(e)}`;
    document.getElementById('rangeDays').textContent = `${diff} day${diff!==1?'s':''} selected`;
    if(activeTab === 'range') updateNoteContext();
  } else if(rangeStart) {
    info.classList.add('visible');
    document.getElementById('rangeText').textContent = `${fmtDate(rangeStart)} → pick end date`;
    document.getElementById('rangeDays').textContent = 'Click another date to finish range';
  } else {
    info.classList.remove('visible');
  }
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

document.getElementById('clearRange').onclick = () => {
  rangeStart = null; rangeEnd = null;
  renderCalendar();
  updateRangeUI();
};

// Quick select
function quickSelect(days) {
  rangeStart = new Date(today);
  rangeEnd = new Date(today);
  rangeEnd.setDate(rangeEnd.getDate() + days - 1);
  viewMonth = today.getMonth();
  viewYear = today.getFullYear();
  renderCalendar();
}
function selectToday() {
  rangeStart = new Date(today);
  rangeEnd = new Date(today);
  viewMonth = today.getMonth();
  viewYear = today.getFullYear();
  renderCalendar();
}

// ── NOTES ──
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabGeneral').classList.toggle('active', tab==='general');
  document.getElementById('tabRange').classList.toggle('active', tab==='range');
  updateNoteContext();
  renderSavedNotes();
}

function updateNoteContext() {
  const label = document.getElementById('noteContextLabel');
  const textarea = document.getElementById('noteTextarea');
  if(activeTab === 'range' && rangeStart && rangeEnd) {
    const s = rangeStart < rangeEnd ? rangeStart : rangeEnd;
    const e = rangeStart < rangeEnd ? rangeEnd : rangeStart;
    label.textContent = `↳ ${fmtDate(s)} – ${fmtDate(e)}`;
    textarea.placeholder = 'Add a note for this date range…';
  } else if(activeTab === 'range') {
    label.textContent = 'Select a date range on the calendar first';
    textarea.placeholder = 'Select a range to attach a note…';
  } else {
    label.textContent = `↳ ${MONTHS[viewMonth]} ${viewYear}`;
    textarea.placeholder = 'Jot something down for this month…';
  }
}

function saveNote() {
  const text = document.getElementById('noteTextarea').value.trim();
  if(!text) { showToast('Write something first!'); return; }

  const note = {
    id: Date.now(),
    text,
    tab: activeTab,
    month: viewMonth,
    year: viewYear,
    created: new Date().toISOString(),
  };

  if(activeTab === 'range' && rangeStart && rangeEnd) {
    const s = rangeStart < rangeEnd ? rangeStart : rangeEnd;
    const e = rangeStart < rangeEnd ? rangeEnd : rangeStart;
    note.rangeStart = s.toISOString().split('T')[0];
    note.rangeEnd   = e.toISOString().split('T')[0];
    note.dateStr    = note.rangeStart;
  }

  notes.unshift(note);
  localStorage.setItem('calNotes', JSON.stringify(notes));
  document.getElementById('noteTextarea').value = '';
  renderSavedNotes();
  renderCalendar();
  showToast('Note saved ✓');
}

function deleteNote(id) {
  notes = notes.filter(n => n.id !== id);
  localStorage.setItem('calNotes', JSON.stringify(notes));
  renderSavedNotes();
  renderCalendar();
}

function renderSavedNotes() {
  const container = document.getElementById('savedNotes');
  const filtered = notes.filter(n => {
    if(activeTab === 'general') return !n.rangeStart;
    return !!n.rangeStart;
  });
  document.getElementById('notesCount').textContent = `${notes.length} note${notes.length!==1?'s':''}`;
  if(!filtered.length) {
    container.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:16px;font-style:italic">No notes yet</div>`;
    return;
  }
  container.innerHTML = filtered.map(n => `
    <div class="note-item" onclick="loadNote(${n.id})">
      <div class="note-item-date">${n.rangeStart ? n.rangeStart + ' → ' + n.rangeEnd : MONTHS[n.month]+' '+n.year}</div>
      <div class="note-item-text">${n.text}</div>
      <button class="note-item-del" onclick="event.stopPropagation();deleteNote(${n.id})">✕</button>
    </div>
  `).join('');
}

function loadNote(id) {
  const note = notes.find(n=>n.id===id);
  if(!note) return;
  document.getElementById('noteTextarea').value = note.text;
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── NAV ──
document.getElementById('prevBtn').onclick = () => {
  viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); updateNoteContext();
};
document.getElementById('nextBtn').onclick = () => {
  viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar(); updateNoteContext();
};

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') document.getElementById('prevBtn').click();
  if(e.key==='ArrowRight'||e.key==='ArrowDown') document.getElementById('nextBtn').click();
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter') saveNote();
});

// ── BOOT ──
initRings();
initThemeSwitcher();
setTheme(0);
renderCalendar();
renderSavedNotes();
updateNoteContext();

// Add CSS animation for @keyframes twinkle via JS (since it's in body scope already)
</script>
</body>
</html>
